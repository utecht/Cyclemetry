name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    # Signing secrets live in the "cyclemetry" GitHub Environment; a job only
    # receives environment-scoped secrets if it declares the environment.
    environment: cyclemetry
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup FFmpeg
        run: |
          # Statically-linked ffmpeg: one self-contained binary, no Homebrew
          # dylibs, no install_name_tool (which corrupts the signature and gets
          # the process SIGKILL'd by AMFI on Apple Silicon).
          # evermeet.cx is x86_64-only; this app is native arm64. Martin Riedl's
          # build service has a stable "latest" redirect for native arm64 macOS.
          curl -L --fail -o ffmpeg.zip \
            https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip
          unzip -o ffmpeg.zip
          mv ffmpeg resources/ffmpeg
          chmod +x resources/ffmpeg

          # Hard-fail the build if it isn't a self-contained arm64 binary
          lipo -archs resources/ffmpeg
          lipo -archs resources/ffmpeg | grep -q arm64 \
            || { echo "ffmpeg missing arm64 slice"; exit 1; }
          otool -L resources/ffmpeg
          if otool -L resources/ffmpeg | tail -n +2 | grep -vqE '/usr/lib/|/System/'; then
            echo "ffmpeg has non-system dynamic dependencies — not static"; exit 1
          fi

          # evermeet builds ship Developer-ID-signed + notarized. Keep that
          # signature if valid; only ad-hoc re-sign as a fallback.
          codesign --verify -vv resources/ffmpeg || codesign --force --sign - resources/ffmpeg
          codesign -dv resources/ffmpeg 2>&1 | head -5

      - name: Install frontend dependencies
        run: pnpm -C app install

      - name: Build Tauri app
        # createUpdaterArtifacts is enabled here (CI only) — not in
        # tauri.conf.json — so local `pnpm build` doesn't require the
        # signing key. CI has it via the secrets below.
        run: app/node_modules/.bin/tauri build --config '{"bundle":{"createUpdaterArtifacts":true}}'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate update manifest
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          SIG=$(cat "src-tauri/target/release/bundle/macos/Cyclemetry.app.tar.gz.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/walkersutton/cyclemetry/releases/download/v${VERSION}/Cyclemetry.app.tar.gz" \
            --arg pub_date "$PUB_DATE" \
            '{
              version: $version,
              notes: "See the release page for details.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > latest.json

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/Cyclemetry.app.tar.gz
            latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    environment: cyclemetry
    permissions:
      contents: write
    env:
      SIGN_WINDOWS: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch Windows FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Recurse ffmpeg_extracted -Filter "ffmpeg.exe" |
                   Where-Object { $_.DirectoryName -like "*bin*" } |
                   Select-Object -First 1
          Copy-Item $exe.FullName resources/ffmpeg.exe
          Write-Host "Bundled ffmpeg: $((Get-Item resources/ffmpeg.exe).Length) bytes"

      - name: Install frontend dependencies
        run: pnpm -C app install

      - name: Import signing certificate
        if: ${{ env.SIGN_WINDOWS == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("windows-cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath windows-cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Remove-Item windows-cert.pfx

      - name: Build Tauri app
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            app/node_modules/.bin/tauri build --bundles nsis --config "{`"bundle`":{`"windows`":{`"digestAlgorithm`":`"sha256`",`"certificateThumbprint`":`"$env:WINDOWS_CERTIFICATE_THUMBPRINT`",`"timestampUrl`":`"http://timestamp.digicert.com`"}}}"
          } else {
            Write-Host "No Windows signing certificate configured; building unsigned installer."
            app/node_modules/.bin/tauri build --bundles nsis
          }

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            ffmpeg_target: linux64
          - arch: arm64
            runner: ubuntu-24.04-arm
            ffmpeg_target: linuxarm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget \
            xz-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch Linux FFmpeg
        run: |
          curl -L --fail -o ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-${{ matrix.ffmpeg_target }}-lgpl.tar.xz
          mkdir ffmpeg_extracted
          tar -xJf ffmpeg.tar.xz -C ffmpeg_extracted --strip-components=1
          cp ffmpeg_extracted/bin/ffmpeg resources/ffmpeg
          chmod +x resources/ffmpeg
          file resources/ffmpeg
          resources/ffmpeg -hide_banner -encoders | grep -q prores_ks

      - name: Install frontend dependencies
        run: pnpm -C app install

      - name: Build Tauri app
        run: app/node_modules/.bin/tauri build --config src-tauri/tauri.linux.conf.json --bundles deb,appimage

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
