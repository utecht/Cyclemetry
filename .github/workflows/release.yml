name: Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Upload build outputs to the GitHub Release for this version'
        required: true
        default: false
        type: boolean
      platform:
        description: 'Platform to build'
        required: true
        default: macos
        type: choice
        options:
          - macos
          - windows
          - linux
          - all

jobs:
  build-macos:
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    # Signing secrets live in the "cyclemetry" GitHub Environment; a job only
    # receives environment-scoped secrets if it declares the environment.
    environment: cyclemetry
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release version
        id: release-version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.25.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup FFmpeg
        run: |
          # Fetch separate static FFmpeg binaries so macOS releases can stay
          # architecture-specific instead of shipping one large universal app.
          mkdir -p ffmpeg-arm64 ffmpeg-x86_64

          curl -L --fail -o ffmpeg-arm64.zip \
            https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip
          unzip -o ffmpeg-arm64.zip -d ffmpeg-arm64

          curl -L --fail -o ffmpeg-x86_64.zip \
            https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg-x86_64.zip -d ffmpeg-x86_64

          ARM64_FFMPEG=$(find ffmpeg-arm64 -type f -name ffmpeg | head -1)
          X86_64_FFMPEG=$(find ffmpeg-x86_64 -type f -name ffmpeg | head -1)

          test -n "$ARM64_FFMPEG"
          test -n "$X86_64_FFMPEG"

          chmod +x "$ARM64_FFMPEG" "$X86_64_FFMPEG"

          echo "ARM64_FFMPEG=$ARM64_FFMPEG" >> "$GITHUB_ENV"
          echo "X86_64_FFMPEG=$X86_64_FFMPEG" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm -C app install

      - name: Build Apple Silicon Tauri app
        # createUpdaterArtifacts is enabled here (CI only) — not in
        # tauri.conf.json — so local `pnpm build` doesn't require the
        # signing key. CI has it via the secrets below.
        run: |
          cp "$ARM64_FFMPEG" resources/ffmpeg
          chmod +x resources/ffmpeg

          lipo -archs resources/ffmpeg
          lipo -archs resources/ffmpeg | grep -q arm64 \
            || { echo "ffmpeg missing arm64 slice"; exit 1; }
          otool -L resources/ffmpeg
          NON_SYSTEM_DEPS=$(otool -L resources/ffmpeg \
            | tail -n +2 \
            | grep -vE '^[[:space:]]*(/usr/lib/|/System/)' \
            || true)
          if [ -n "$NON_SYSTEM_DEPS" ]; then
            echo "$NON_SYSTEM_DEPS"
            echo "ffmpeg has non-system dynamic dependencies — not static"; exit 1
          fi

          codesign --force --sign - resources/ffmpeg
          codesign -dv resources/ffmpeg 2>&1 | head -5

          app/node_modules/.bin/tauri build --target aarch64-apple-darwin --config '{"bundle":{"createUpdaterArtifacts":true}}'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Intel Mac Tauri app
        run: |
          cp "$X86_64_FFMPEG" resources/ffmpeg
          chmod +x resources/ffmpeg

          lipo -archs resources/ffmpeg
          lipo -archs resources/ffmpeg | grep -q x86_64 \
            || { echo "ffmpeg missing x86_64 slice"; exit 1; }
          otool -L resources/ffmpeg
          NON_SYSTEM_DEPS=$(otool -L resources/ffmpeg \
            | tail -n +2 \
            | grep -vE '^[[:space:]]*(/usr/lib/|/System/)' \
            || true)
          if [ -n "$NON_SYSTEM_DEPS" ]; then
            echo "$NON_SYSTEM_DEPS"
            echo "ffmpeg has non-system dynamic dependencies — not static"; exit 1
          fi

          codesign --force --sign - resources/ffmpeg
          codesign -dv resources/ffmpeg 2>&1 | head -5

          app/node_modules/.bin/tauri build --target x86_64-apple-darwin --config '{"bundle":{"createUpdaterArtifacts":true}}'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare macOS release assets
        id: release-assets
        shell: bash
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          mkdir -p release-assets

          ARM_DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -1)
          INTEL_DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -1)
          test -n "$ARM_DMG"
          test -n "$INTEL_DMG"

          cp "$ARM_DMG" "release-assets/Cyclemetry-macOS-Apple-Silicon-v${VERSION}.dmg"
          cp "$INTEL_DMG" "release-assets/Cyclemetry-macOS-Intel-v${VERSION}.dmg"
          cp "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Cyclemetry.app.tar.gz" \
            "release-assets/Cyclemetry-macOS-updater-Apple-Silicon-v${VERSION}.app.tar.gz"
          cp "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Cyclemetry.app.tar.gz.sig" \
            "release-assets/Cyclemetry-macOS-updater-Apple-Silicon-v${VERSION}.app.tar.gz.sig"
          cp "src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Cyclemetry.app.tar.gz" \
            "release-assets/Cyclemetry-macOS-updater-Intel-v${VERSION}.app.tar.gz"
          cp "src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Cyclemetry.app.tar.gz.sig" \
            "release-assets/Cyclemetry-macOS-updater-Intel-v${VERSION}.app.tar.gz.sig"

          echo "arm_updater_asset_name=Cyclemetry-macOS-updater-Apple-Silicon-v${VERSION}.app.tar.gz" >> "$GITHUB_OUTPUT"
          echo "intel_updater_asset_name=Cyclemetry-macOS-updater-Intel-v${VERSION}.app.tar.gz" >> "$GITHUB_OUTPUT"
          ls -la release-assets

      - name: Generate update manifest
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          ARM_SIG=$(cat "release-assets/Cyclemetry-macOS-updater-Apple-Silicon-v${VERSION}.app.tar.gz.sig")
          INTEL_SIG=$(cat "release-assets/Cyclemetry-macOS-updater-Intel-v${VERSION}.app.tar.gz.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "$VERSION" \
            --arg arm_sig "$ARM_SIG" \
            --arg intel_sig "$INTEL_SIG" \
            --arg arm_url "https://github.com/walkersutton/cyclemetry/releases/download/v${VERSION}/${{ steps.release-assets.outputs.arm_updater_asset_name }}" \
            --arg intel_url "https://github.com/walkersutton/cyclemetry/releases/download/v${VERSION}/${{ steps.release-assets.outputs.intel_updater_asset_name }}" \
            --arg pub_date "$PUB_DATE" \
            '{
              version: $version,
              notes: "See the release page for details.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $arm_sig,
                  url: $arm_url
                },
                "darwin-x86_64": {
                  signature: $intel_sig,
                  url: $intel_url
                }
              }
            }' > latest.json

      - name: Upload macOS workflow artifacts
        if: ${{ !inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: cyclemetry-macos
          path: |
            release-assets/*
            latest.json

      - name: Upload artifacts to release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-version.outputs.tag }}
          files: |
            release-assets/Cyclemetry-macOS-Apple-Silicon-v${{ steps.release-version.outputs.version }}.dmg
            release-assets/Cyclemetry-macOS-Intel-v${{ steps.release-version.outputs.version }}.dmg
            release-assets/Cyclemetry-macOS-updater-Apple-Silicon-v${{ steps.release-version.outputs.version }}.app.tar.gz
            release-assets/Cyclemetry-macOS-updater-Intel-v${{ steps.release-version.outputs.version }}.app.tar.gz
            latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    environment: cyclemetry
    permissions:
      contents: write
    env:
      SIGN_WINDOWS: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release version
        id: release-version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.25.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch Windows FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Recurse ffmpeg_extracted -Filter "ffmpeg.exe" |
                   Where-Object { $_.DirectoryName -like "*bin*" } |
                   Select-Object -First 1
          Copy-Item $exe.FullName resources/ffmpeg.exe
          Write-Host "Bundled ffmpeg: $((Get-Item resources/ffmpeg.exe).Length) bytes"

      - name: Install frontend dependencies
        run: pnpm -C app install

      - name: Import signing certificate
        if: ${{ env.SIGN_WINDOWS == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("windows-cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath windows-cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Remove-Item windows-cert.pfx

      - name: Build Tauri app
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            app/node_modules/.bin/tauri build --bundles nsis --config "{`"bundle`":{`"windows`":{`"digestAlgorithm`":`"sha256`",`"certificateThumbprint`":`"$env:WINDOWS_CERTIFICATE_THUMBPRINT`",`"timestampUrl`":`"http://timestamp.digicert.com`"}}}"
          } else {
            Write-Host "No Windows signing certificate configured; building unsigned installer."
            app/node_modules/.bin/tauri build --bundles nsis
          }

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          $version = "${{ steps.release-version.outputs.version }}"
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "No Windows installer found" }
          Copy-Item $installer.FullName "release-assets/Cyclemetry-Windows-x64-Setup-v$version.exe"
          Get-ChildItem release-assets

      - name: Upload artifacts to release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-version.outputs.tag }}
          files: release-assets/Cyclemetry-Windows-x64-Setup-v${{ steps.release-version.outputs.version }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows workflow artifacts
        if: ${{ !inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: cyclemetry-windows
          path: release-assets/*

  build-linux:
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            ffmpeg_target: linux64
          - arch: arm64
            runner: ubuntu-24.04-arm
            ffmpeg_target: linuxarm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release version
        id: release-version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget \
            xz-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.25.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch Linux FFmpeg
        run: |
          curl -L --fail -o ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-${{ matrix.ffmpeg_target }}-lgpl.tar.xz
          mkdir ffmpeg_extracted
          tar -xJf ffmpeg.tar.xz -C ffmpeg_extracted --strip-components=1
          cp ffmpeg_extracted/bin/ffmpeg resources/ffmpeg
          chmod +x resources/ffmpeg
          file resources/ffmpeg
          resources/ffmpeg -hide_banner -encoders | grep -q prores_ks

      - name: Install frontend dependencies
        run: pnpm -C app install

      - name: Build Tauri app
        run: app/node_modules/.bin/tauri build --config src-tauri/tauri.linux.conf.json --bundles deb,appimage

      - name: Prepare Linux release assets
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          if [ "$ARCH" = "amd64" ]; then
            ASSET_ARCH="x64"
          else
            ASSET_ARCH="ARM64"
          fi
          mkdir -p release-assets

          DEB=$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name '*.deb' | head -1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -1)
          test -n "$DEB"
          test -n "$APPIMAGE"

          cp "$DEB" "release-assets/Cyclemetry-Linux-${ASSET_ARCH}-Debian-v${VERSION}.deb"
          cp "$APPIMAGE" "release-assets/Cyclemetry-Linux-${ASSET_ARCH}-AppImage-v${VERSION}.AppImage"
          ls -la release-assets

      - name: Upload artifacts to release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-version.outputs.tag }}
          files: |
            release-assets/*.deb
            release-assets/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux workflow artifacts
        if: ${{ !inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: cyclemetry-linux-${{ matrix.arch }}
          path: |
            release-assets/*
